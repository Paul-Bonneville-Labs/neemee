# Google Cloud Build - Staging Deployment
# Triggered by: commits to 'develop' branch
# Purpose: Deploy to staging environment using buildpacks

steps:
  # Step 1: Sync secrets from .env.staging to Google Cloud Secrets Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔐 Syncing secrets from .env.staging to Google Cloud Secrets Manager..."
        
        # Function to update or create secret
        update_secret() {
          local secret_name="$1"
          local secret_value="$2"
          
          if gcloud secrets describe "$secret_name" >/dev/null 2>&1; then
            echo "Updating existing secret: $secret_name"
            echo -n "$secret_value" | gcloud secrets versions add "$secret_name" --data-file=-
          else
            echo "Creating new secret: $secret_name"
            echo -n "$secret_value" | gcloud secrets create "$secret_name" --data-file=-
          fi
        }
        
        # Read .env.staging and sync secrets
        if [ -f ".env.staging" ]; then
          while IFS='=' read -r key value || [ -n "$key" ]; do
            # Skip empty lines and comments
            [[ -z "$key" || "$key" =~ ^[[:space:]]*# ]] && continue
            
            # Remove quotes and whitespace
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | sed 's/^"//;s/"$//' | xargs)
            
            # Map environment variables to secret names
            case "$key" in
              DATABASE_URL) update_secret "neemee-staging-database-url" "$value" ;;
              AUTH_SECRET) update_secret "neemee-staging-auth-secret" "$value" ;;
              AUTH_GOOGLE_ID) update_secret "neemee-staging-google-oauth-id" "$value" ;;
              AUTH_GOOGLE_SECRET) update_secret "neemee-staging-google-oauth-secret" "$value" ;;
              AUTH_GITHUB_ID) update_secret "neemee-staging-github-oauth-id" "$value" ;;
              AUTH_GITHUB_SECRET) update_secret "neemee-staging-github-oauth-secret" "$value" ;;
              BACKEND_API_URL) update_secret "neemee-staging-backend-api-url" "$value" ;;
              BACKEND_API_KEY) update_secret "neemee-staging-backend-api-key" "$value" ;;
            esac
          done < .env.staging
          
          echo "✅ Secrets synchronized successfully"
        else
          echo "⚠️ .env.staging file not found, skipping secret sync"
        fi
    id: 'Sync-Secrets'
    
  # Step 2: Install dependencies with caching
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "📦 Installing dependencies for staging build..."
        npm ci --prefer-offline --no-audit --production=false
        echo "✅ Dependencies installed"
    id: 'Install-Dependencies'
    
  # Step 3: Generate Prisma client
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Generating Prisma client..."
        npx prisma generate
        echo "✅ Prisma client generated"
    id: 'Generate-Prisma-Client'

  # Step 4: Rebuild native dependencies for Linux x64
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔧 Rebuilding native dependencies for Linux x64..."
        # Force rebuild of lightningcss native binaries
        npm rebuild lightningcss --platform=linux --arch=x64
        echo "✅ Native dependencies rebuilt"
    id: 'Rebuild-Native-Dependencies'

  # Step 5: Quality checks (fast fail for staging)
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔍 Running quality checks..."
        npm run type-check
        npm run lint
        echo "✅ Quality checks passed"
    id: 'Quality-Checks'

  # Step 6: Build validation (ensure Next.js builds successfully)
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🏗️ Validating Next.js staging build..."
        npm run build
        echo "✅ Staging build validation completed"
    env:
      - 'NODE_ENV=staging'
    id: 'Build-Validation'

  # Step 7: Deploy to Cloud Run using buildpacks
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    dir: 'frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neemee-frontend-staging'
      - '--source=.'  # Deploy from current directory (frontend)
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--allow-unauthenticated'
      # Environment variables
      - '--set-env-vars=NODE_ENV=staging'
      - '--set-env-vars=NEXT_PUBLIC_BASE_URL=https://neemee-frontend-staging-860937201650.us-central1.run.app'
      - '--set-env-vars=NEXTAUTH_URL=https://neemee-frontend-staging-860937201650.us-central1.run.app'
      # Staging secrets (Auth.js v5 + Prisma)
      - '--set-secrets=DATABASE_URL=neemee-staging-database-url:latest'
      - '--set-secrets=AUTH_SECRET=neemee-staging-auth-secret:latest'
      - '--set-secrets=AUTH_GOOGLE_ID=neemee-staging-google-oauth-id:latest'
      - '--set-secrets=AUTH_GOOGLE_SECRET=neemee-staging-google-oauth-secret:latest'
      - '--set-secrets=AUTH_GITHUB_ID=neemee-staging-github-oauth-id:latest'
      - '--set-secrets=AUTH_GITHUB_SECRET=neemee-staging-github-oauth-secret:latest'
      - '--set-secrets=BACKEND_API_URL=neemee-staging-backend-api-url:latest'
      - '--set-secrets=BACKEND_API_KEY=neemee-staging-backend-api-key:latest'
      # Deployment metadata
      - '--labels=environment=staging,managed-by=cloud-build,commit-sha=$COMMIT_SHA,build-id=$BUILD_ID'
      - '--quiet'
    id: 'Deploy-to-Staging'

  # Step 8: Run staging smoke tests
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🧪 Running staging smoke tests..."
        SERVICE_URL=$$(gcloud run services describe neemee-frontend-staging --region=us-central1 --format="value(status.url)")
        
        echo "Testing staging deployment at: $$SERVICE_URL"
        
        # Test 1: Health check with retry
        echo "🔍 Health check..."
        for i in {1..3}; do
          response=$$(curl -s -o /dev/null -w "%{http_code}" "$$SERVICE_URL" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed (HTTP $response)"
            break
          else
            if [ "$i" = "3" ]; then
              echo "❌ Health check failed after 3 attempts (HTTP $response)"
              exit 1
            else
              echo "⏳ Health check failed, retrying in 15 seconds..."
              sleep 15
            fi
          fi
        done
        
        # Test 2: Basic page content
        if curl -s "$$SERVICE_URL" | grep -q "neemee\|Neemee"; then
          echo "✅ Page content validation passed"
        else
          echo "❌ Page content validation failed"
          exit 1
        fi
        
        echo "🎉 Staging deployment successful!"
        echo "🌐 Staging URL: $$SERVICE_URL"
    id: 'Staging-Smoke-Tests'

# Build configuration
timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

# Staging environment substitutions
substitutions:
  _ENVIRONMENT: 'staging'
  _SERVICE_NAME: 'neemee-frontend-staging'

# Tags for identification
tags:
  - 'staging-deployment'
  - 'neemee-frontend'
  - 'automated-deployment'
  - 'buildpacks'