# Google Cloud Build - Production Deployment
# Triggered by: commits to 'main' branch
# Purpose: Deploy to production environment using buildpacks with enhanced safety checks

steps:
  # Step 1: Install dependencies with caching
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "📦 Installing dependencies for production build..."
        npm ci --prefer-offline --no-audit --production=false
        echo "✅ Dependencies installed"
    id: 'Install-Dependencies'
    
  # Step 2: Generate Prisma client
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Generating Prisma client..."
        npx prisma generate
        echo "✅ Prisma client generated"
    id: 'Generate-Prisma-Client'

  # Step 3: Comprehensive quality checks (strict for production)
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔍 Running comprehensive quality checks..."
        
        # TypeScript strict checking
        echo "🔍 TypeScript validation..."
        npm run type-check
        
        # ESLint with zero warnings
        echo "🔍 ESLint validation..."
        npm run lint
        
        # Security audit
        echo "🔒 Security audit..."
        npm audit --audit-level=moderate
        
        echo "✅ All quality checks passed for production"
    id: 'Quality-Checks'

  # Step 4: Build validation test (ensure Next.js builds successfully)
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🏗️ Validating Next.js production build..."
        # Create minimal .env for build test
        echo "DATABASE_URL=postgresql://test:test@localhost:5432/test" > .env.local
        echo "AUTH_SECRET=test-secret-for-build-validation" >> .env.local
        echo "NEXT_PUBLIC_BASE_URL=https://neemee.paulbonneville.com" >> .env.local
        npm run build
        echo "✅ Production build validation completed"
    env:
      - 'NODE_ENV=production'
    id: 'Build-Validation'

  # Step 5: Deploy to production using buildpacks (no traffic initially)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neemee-frontend'
      - '--source=.'  # Use buildpacks instead of Docker
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'  # Always-on for production
      - '--max-instances=100'
      - '--concurrency=80'
      - '--timeout=300'
      - '--allow-unauthenticated'
      # Environment variables
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=NEXT_PUBLIC_BASE_URL=https://neemee.paulbonneville.com'
      - '--set-env-vars=NEXTAUTH_URL=https://neemee.paulbonneville.com'
      # Production secrets (Auth.js v5 + Prisma)
      - '--set-secrets=DATABASE_URL=neemee-database-url:latest'
      - '--set-secrets=AUTH_SECRET=neemee-auth-secret:latest'
      - '--set-secrets=AUTH_GOOGLE_ID=neemee-google-oauth-id:latest'
      - '--set-secrets=AUTH_GOOGLE_SECRET=neemee-google-oauth-secret:latest'
      - '--set-secrets=AUTH_GITHUB_ID=neemee-github-oauth-id:latest'
      - '--set-secrets=AUTH_GITHUB_SECRET=neemee-github-oauth-secret:latest'
      - '--set-secrets=BACKEND_API_URL=neemee-backend-api-url:latest'
      - '--set-secrets=BACKEND_API_KEY=neemee-backend-api-key:latest'
      # Deployment metadata
      - '--labels=environment=production,managed-by=cloud-build,commit-sha=$COMMIT_SHA,build-id=$BUILD_ID'
      - '--no-traffic'  # Deploy without traffic initially for testing
      - '--tag=candidate'  # Tag this revision as candidate
      - '--quiet'
    id: 'Deploy-Production-No-Traffic'

  # Step 6: Run comprehensive production health checks on candidate revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🧪 Running comprehensive production health checks..."
        
        # Get the candidate revision URL for testing
        CANDIDATE_URL=$(gcloud run services describe neemee-frontend --region=us-central1 --format="value(status.traffic[?tag='candidate'].url)")
        
        if [ -z "$CANDIDATE_URL" ]; then
          echo "❌ Could not find candidate revision URL"
          exit 1
        fi
        
        echo "Testing candidate revision at: $CANDIDATE_URL"
        
        # Test 1: Health check with retries
        echo "🔍 Health check with retries..."
        for i in {1..5}; do
          response=$(curl -s -o /dev/null -w "%{http_code}" "$CANDIDATE_URL" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed (HTTP $response) on attempt $i"
            break
          else
            if [ "$i" = "5" ]; then
              echo "❌ Health check failed after 5 attempts (HTTP $response)"
              exit 1
            else
              echo "⏳ Health check failed (HTTP $response), retrying in 15 seconds... (attempt $i/5)"
              sleep 15
            fi
          fi
        done
        
        # Test 2: Page content validation
        echo "🔍 Page content validation..."
        if curl -s "$CANDIDATE_URL" | grep -q "neemee\|Neemee"; then
          echo "✅ Page content validation passed"
        else
          echo "❌ Page content validation failed"
          exit 1
        fi
        
        # Test 3: Critical API endpoints
        echo "🔍 API endpoint validation..."
        api_response=$(curl -s -o /dev/null -w "%{http_code}" "$CANDIDATE_URL/api/auth/session" || echo "000")
        if [[ "$api_response" =~ ^[23] ]]; then
          echo "✅ API endpoints responding (HTTP $api_response)"
        else
          echo "❌ API endpoints failed (HTTP $api_response)"
          exit 1
        fi
        
        echo "✅ All production health checks passed!"
    id: 'Production-Health-Checks'

  # Step 7: Switch 100% traffic to new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🚀 Switching traffic to new production revision..."
        
        # Switch 100% traffic to the candidate revision
        gcloud run services update-traffic neemee-frontend \
          --to-tags=candidate=100 \
          --region=us-central1
          
        # Wait for traffic switch to complete
        sleep 30
        
        # Final validation on production URL
        echo "🔍 Final production validation..."
        PROD_URL="https://neemee.paulbonneville.com"
        
        for i in {1..3}; do
          response=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Production traffic switch successful (HTTP $response)"
            break
          else
            if [ "$i" = "3" ]; then
              echo "❌ Production validation failed after traffic switch (HTTP $response)"
              echo "🔄 Rolling back to previous revision..."
              
              # Get the previous revision (second most recent)
              PREVIOUS_REVISION=$(gcloud run revisions list --service=neemee-frontend --region=us-central1 --format="value(metadata.name)" --limit=2 --sort-by="~metadata.creationTimestamp" | tail -1)
              
              if [ -n "$PREVIOUS_REVISION" ]; then
                gcloud run services update-traffic neemee-frontend \
                  --to-revisions=$PREVIOUS_REVISION=100 \
                  --region=us-central1
                echo "Rolled back to revision: $PREVIOUS_REVISION"
              fi
              
              exit 1
            else
              echo "⏳ Retrying production validation... (attempt $i/3)"
              sleep 15
            fi
          fi
        done
        
        # Remove the candidate tag after successful deployment
        gcloud run services update-traffic neemee-frontend \
          --remove-tags=candidate \
          --region=us-central1
        
        echo "🎉 Production deployment completed successfully!"
        echo "🌐 Production URL: $PROD_URL"
    id: 'Switch-Production-Traffic'

# Build configuration (more resources for production)
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_STANDARD_4'  # Larger machine for production builds
  diskSizeGb: 100

# Production environment substitutions
substitutions:
  _ENVIRONMENT: 'production'
  _SERVICE_NAME: 'neemee-frontend'

# Tags for identification
tags:
  - 'production-deployment'
  - 'neemee-frontend'
  - 'automated-deployment'
  - 'buildpacks'
  - 'critical'