steps:
  # Step 1: Get secrets and set as build-time environment variables
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔐 Fetching secrets for build-time access..."
        # Get secrets and write directly to .env file
        echo "NEXT_PUBLIC_SUPABASE_URL=$(gcloud secrets versions access latest --secret='neemee-supabase-url')" > .env.production
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(gcloud secrets versions access latest --secret='neemee-supabase-anon-key')" >> .env.production  
        echo "GITHUB_TOKEN=$(gcloud secrets versions access latest --secret='neemee-github-token')" >> .env.production
        echo "GITHUB_REPO_OWNER=$(gcloud secrets versions access latest --secret='neemee-github-repo-owner')" >> .env.production
        echo "GITHUB_REPO_NAME=$(gcloud secrets versions access latest --secret='neemee-github-repo-name')" >> .env.production
        echo "NODE_ENV=production" >> .env.production
        
        echo "✅ Build environment configured"
    id: 'Setup-Build-Env'

  # Step 2: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'Install-Dependencies'

  # Step 3: Build Next.js app with secrets available
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'NODE_ENV=production'
    id: 'Build-App'

  # Step 4: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/neemee-frontend:$BUILD_ID'
      - '.'
    id: 'Build-Image'

  # Step 5: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/neemee-frontend:$BUILD_ID'
    id: 'Push-Image'

  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neemee-frontend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/neemee-frontend:$BUILD_ID'
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--allow-unauthenticated'
      # Runtime secrets (still needed for server-side operations)
      - '--set-secrets=GITHUB_TOKEN=neemee-github-token:latest'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_URL=neemee-supabase-url:latest'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_ANON_KEY=neemee-supabase-anon-key:latest'
      - '--set-secrets=GITHUB_REPO_OWNER=neemee-github-repo-owner:latest'
      - '--set-secrets=GITHUB_REPO_NAME=neemee-github-repo-name:latest'
      - '--set-env-vars=NODE_ENV=production'
      - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--quiet'
    id: 'Deploy'

# Note: No separate image build step needed - Cloud Run source deployment handles everything

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Use faster machine for build

# Required IAM permissions for Cloud Build service account:
# - Cloud Run Admin
# - Secret Manager Secret Accessor
# - Artifact Registry Writer
# - Service Account User

tags:
  - 'gcp-cloud-build-deploy-cloud-run'
  - 'gcp-cloud-build-deploy-cloud-run-managed'
  - 'neemee-frontend'