steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install-deps'

  # Type checking
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'type-check']
    id: 'type-check'
    waitFor: ['install-deps']

  # Linting
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    id: 'lint'
    waitFor: ['install-deps']

  # Build verification
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    id: 'build'
    waitFor: ['type-check', 'lint']

# Use high-CPU machine for faster parallel execution
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Set timeout for the entire build
timeout: '1200s'