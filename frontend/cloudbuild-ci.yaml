steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'frontend'
    id: 'install-deps'

  # Type checking
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'type-check']
    dir: 'frontend'
    id: 'type-check'
    waitFor: ['install-deps']

  # Linting
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'frontend'
    id: 'lint'
    waitFor: ['install-deps']

  # Build verification
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'
    id: 'build'
    waitFor: ['type-check', 'lint']

# Use high-CPU machine for faster parallel execution
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# CI-only environment variables (dummy values for build validation)
env:
  - 'DATABASE_URL=postgresql://ci-dummy:dummy@localhost:5432/ci-test'
  - 'AUTH_SECRET=ci-dummy-secret-for-build-validation-only'
  - 'AUTH_GOOGLE_ID=ci-dummy-google-id'
  - 'AUTH_GOOGLE_SECRET=ci-dummy-google-secret'
  - 'AUTH_GITHUB_ID=ci-dummy-github-id'
  - 'AUTH_GITHUB_SECRET=ci-dummy-github-secret'
  - 'NEXTAUTH_URL=http://localhost:3000'
  - 'NEXT_PUBLIC_BASE_URL=http://localhost:3000'
  - 'BACKEND_API_URL=http://localhost:8000'
  - 'BACKEND_API_KEY=ci-dummy-api-key'
  - 'NODE_ENV=production'

# Set timeout for the entire build
timeout: '1200s'