# Cloud Build configuration for Neemee Frontend with Prisma + Cloud SQL
# Optimized for POC deployment with database integration

steps:
  # Step 1: Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']
    env:
      - 'NODE_ENV=production'

  # Step 2: Generate Prisma client
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['prisma', 'generate']
    env:
      - 'DATABASE_URL=$_DATABASE_URL'

  # Step 3: Run database migrations (if needed)
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['prisma', 'db', 'push', '--accept-data-loss']
    env:
      - 'DATABASE_URL=$_DATABASE_URL'

  # Step 4: Build Next.js application
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'NODE_ENV=production'
      - 'DATABASE_URL=$_DATABASE_URL'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neemee-frontend'
      - '--image'
      - 'gcr.io/buildpacks/builder:v1'
      - '--source'
      - '.'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'DATABASE_URL=neemee-database-url:latest'
      - '--add-cloudsql-instances'
      - '$_CLOUD_SQL_CONNECTION_NAME'

# Substitutions for build variables
substitutions:
  _DATABASE_URL: 'postgresql://neemee_user:${_DB_PASSWORD}@localhost:5432/neemee?host=/cloudsql/${PROJECT_ID}:us-central1:neemee-postgres-poc'
  _CLOUD_SQL_CONNECTION_NAME: '${PROJECT_ID}:us-central1:neemee-postgres-poc'

options:
  # Use high-CPU machine for faster builds
  machineType: 'E2_HIGHCPU_8'
  
  # Enable concurrent steps where possible
  substitution_option: 'ALLOW_LOOSE'
  
  # Logging configuration
  logging: 'CLOUD_LOGGING_ONLY'

# Build timeout (10 minutes should be sufficient)
timeout: '600s'