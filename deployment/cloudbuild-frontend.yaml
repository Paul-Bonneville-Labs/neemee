steps:
  # Deploy frontend to Cloud Run using buildpacks
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neemee-frontend'
      - '--source=./frontend'
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=100'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=production,VERSION=$COMMIT_SHA'
      - '--port=3000'
      - '--allow-unauthenticated'
      - '--quiet'
    id: 'Deploy'

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - 'gcp-cloud-build-deploy-cloud-run'
  - 'gcp-cloud-build-deploy-cloud-run-managed'
  - 'neemee-frontend'