steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-central1-docker.pkg.dev/paulbonneville-com/cloud-run-source-deploy/neemee-backend/neemee-backend:$COMMIT_SHA'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: 'Build'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/paulbonneville-com/cloud-run-source-deploy/neemee-backend/neemee-backend:$COMMIT_SHA'
    id: 'Push'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'neemee-backend'
      - '--platform=managed'
      - '--image=us-central1-docker.pkg.dev/paulbonneville-com/cloud-run-source-deploy/neemee-backend/neemee-backend:$COMMIT_SHA'
      - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=paulbonneville-com'
      - '--set-env-vars=GOOGLE_CLOUD_REGION=us-central1'
      - '--set-env-vars=LLM_MODEL=gpt-4-turbo'
      - '--set-env-vars=LLM_TEMPERATURE=0.1'
      - '--set-env-vars=LLM_MAX_TOKENS=2000'
      - '--set-env-vars=NEO4J_USER=neo4j'
      - '--set-env-vars=NEO4J_DATABASE=neo4j'
      - '--set-env-vars=MAX_ENTITIES_PER_NEWSLETTER=500'
      - '--set-env-vars=FACT_EXTRACTION_BATCH_SIZE=20'
      - '--set-env-vars=PROCESSING_TIMEOUT=600'
      - '--set-env-vars=ENTITY_CONFIDENCE_THRESHOLD=0.8'
      - '--set-env-vars=FACT_CONFIDENCE_THRESHOLD=0.85'
      - '--set-env-vars=API_HOST=0.0.0.0'
      - '--set-env-vars=API_PORT=8080'
      - '--set-env-vars=LOG_LEVEL=INFO'
      - '--set-env-vars=ENABLE_METRICS=true'
      - '--set-env-vars=METRICS_PORT=9090'
      - '--set-env-vars=ENABLE_ASYNC_PROCESSING=true'
      - '--set-env-vars=ENABLE_ENTITY_CACHING=true'
      - '--set-env-vars=ENABLE_DEBUG_MODE=false'
      - '--set-env-vars=CORS_ORIGINS=[\"https://neemee.paulbonneville.com\"]'
      - '--set-secrets=OPENAI_API_KEY=neemee-openai-api-key:latest'
      - '--set-secrets=NEO4J_PASSWORD=neemee-neo4j-password:latest'
      - '--set-secrets=NEO4J_URI=neemee-neo4j-uri:latest'
      - '--set-secrets=SECRET_KEY=neemee-secret-key:latest'
      - '--set-secrets=API_KEY=neemee-backend-key:latest'
      - '--set-secrets=FIRECRAWL_API_KEY=neemee-firecrawl-key:latest'
      - '--port=8080'
      - '--quiet'
    id: 'Deploy'

# Store images in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/paulbonneville-com/cloud-run-source-deploy/neemee-backend/neemee-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - 'gcp-cloud-build-deploy-cloud-run'
  - 'gcp-cloud-build-deploy-cloud-run-managed'
  - 'neemee-backend'